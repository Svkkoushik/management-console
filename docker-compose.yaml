services:
  postgres:
    image: postgres:16
    container_name: mc-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DATABASE: postgres
    ports:
      - 5432:5432

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: mc-rabbitmq
    restart: always
    ports:
      - 5672:5672
      - 15672:15672

  backend:
    profiles:
      - prod

    build:
      context: .
      dockerfile: Dockerfile.backend

    depends_on:
      - postgres
      - rabbitmq

    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/

    ports:
      - 8000:8000

  webapp:
    profiles:
      - prod

    build:
      context: .
      dockerfile: Dockerfile.webapp

    depends_on:
      - postgres
      - rabbitmq

    ports:
      - 3000:3000
